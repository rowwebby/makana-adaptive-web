<template>
    <template lwc:if={show}>
        <div class="chatbot-container">
            <div class="messages-container">
                <template for:each={filteredEntries} for:item="entry">
                    <div key={entry.id} class={entry.messageClass}>
                        <!-- Agent logo for bot messages -->
                        <template lwc:if={entry.isFromBot}>
                            <div class="agent-logo">
                                <img src={AGENT_LOGO_IMAGE_URL} alt="Agent Logo" />
                            </div>
                        </template>
                        
                        <div class="message-wrapper">
                            <div class="message-content">
                                <div class="message-text">{entry.text}</div>
                            </div>

                            <template lwc:if={entry.hasOptions}>
                                <div class="message-choices">
                                    <template for:each={entry.options} for:item="option">
                                        <button
                                            key={option.name}
                                            class="choice-button"
                                            data-option={option.name}
                                            onclick={handleChoiceSelection}
                                        >
                                            {option.name}
                                        </button>
                                    </template>
                                </div>
                            </template>

                            <template lwc:if={entry.timestamp}>
                                <div class="message-timestamp">
                                    {entry.timestampLabel}
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
                
                <!-- Typing indicator -->
                <template lwc:if={isAnotherParticipantTyping}>
                    <div class="message message-bot">
                        <div class="agent-logo">
                            <img src={AGENT_LOGO_IMAGE_URL} alt="Agent Logo" />
                        </div>
                        <div class="message-wrapper">
                            <div class="message-content">
                                <div class="typing-indicator">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <form onsubmit={handleSendMessage} class="message-input-form">
                <div class="message-input-container">
                    <div class="input-row">
                        <div class="textarea-container">
                            <textarea
                                oninput={handleInputChange}
                                onkeydown={handleKeyPress}
                                placeholder="Ask me anything..."
                                class="message-input"
                                rows="1"
                            >{inputText}</textarea>
                        </div>
                        <button type="submit" class="send-button" title="Send message">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 2L11 13"></path>
                                <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </template>
</template>
