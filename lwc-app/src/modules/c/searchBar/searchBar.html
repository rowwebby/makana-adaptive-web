<template>
    <template lwc:if={show}>
        <div class="search-container">
            <form onsubmit={handleSearch} class="search-form">
                <div class="search-bar">
                    <div class="search-icon">
                        <img src={AGENT_LOGO_IMAGE_URL} alt="Search" />
                    </div>
                    <input
                        type="text"
                        name="searchText"
                        value={searchText}
                        oninput={handleInputChange}
                        placeholder="Welcome! How can I help you today?"
                        class="search-input"
                    />
                    
                    <div class="search-actions">
                        <template for:each={searchActions} for:item="action" for:index="index">
                            <button
                                key={action.value}
                                type="submit"
                                name="buttonText"
                                class="search-action-button"
                                value={action.value}
                            >
                                {action.text}
                            </button>
                        </template>
                    </div>
                </div>
            </form>
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width="18" 
                height="18" 
                viewBox="0 0 18 18" 
                fill="none"
                class="expand-button"
                onclick={handleExpand}
            >
                <path 
                    d="M5 11L9 7L13 11" 
                    stroke="white"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                />
            </svg>
        </div>
    </template>
</template>
